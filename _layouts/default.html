<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:          #0d1117;
      --paper:        #f0ede8;
      --accent:       #1a6cf5;
      --muted:        #6b7280;
      --border:       #e2ddd7;
      --card:         #ffffff;
      --tag-blue-bg:  #eef3ff;
      --tag-blue-text:#1a6cf5;
      --tag-green-bg: #e8f5ee;
      --tag-green-text:#1a7a4a;
      --tag-orange-bg:#fef0e8;
      --tag-orange-text:#d4500c;
      --accent-green: #22c55e;
      --muted-light:  #9ca3af;
      --border-dark:  #ccc8c2;
      --text:         #0d1117;
      --white:        #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 56px;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 0.82rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.72rem; letter-spacing: 0.06em;
      color: var(--muted); text-decoration: none;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-links a.active { color: var(--accent); }

    footer {
      border-top: 1px solid var(--border); padding: 1.4rem 2.5rem;
      display: flex; justify-content: center;
      font-size: 0.62rem; letter-spacing: 0.06em; color: var(--muted-light);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--ink); }

    @media (max-width: 640px) {
      nav { padding: 0 1.2rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="{{ site.baseurl }}/">{{ site.title }}</a>
    <ul class="nav-links">
      {% for item in site.nav %}
      <li><a href="{{ item.url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.label }}</a></li>
      {% endfor %}
    </ul>
  </nav>

  {{ content }}

  <footer>
    Maintained by <a href="https://github.com/{{ site.github_username }}" style="margin:0 0.3rem">{{ site.title }}</a> &middot; Hosted on <a href="{{ site.footer.hosted_url }}" style="margin:0 0.3rem">{{ site.footer.hosted_on }}</a>
  </footer>

</body>
</html>
